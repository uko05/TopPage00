    <link rel="icon" sizes="16x16" href="public/scripts/favicon_io/favicon-16x16.png">

<body class="portal-page">

    <header class="portal-header">
        <!-- 右上：言語切替 -->
        <div class="lang-switch" aria-label="Language switch">
            <label class="lang-option">
                <input type="radio" name="lang" value="ja" checked />
                <span data-i18n="langJa">日本語</span>
            </label>
            <label class="lang-option">
                <input type="radio" name="lang" value="en" />
                <span data-i18n="langEn">English</span>
            </label>
        </div>

        <h1 id="site-title" data-i18n="homeTitle">うーこの部屋</h1>
    </header>

    <main class="portal-container">

        <!-- 推しキャラランキング -->
        <section class="portal-section">
            <h2 id="sec-ranking" data-i18n="secRanking">推しキャラランキング</h2>

            <div class="card-grid">
                <a href="https://uko05.github.io/TiersList01/" class="card">
                    <h3 data-i18n="cardGenshin">原神</h3>
                    <img src="Image/01_genshin.png" alt="原神" loading="lazy">
                </a>

                <a href="https://uko05.github.io/TiersList02/" class="card">
                    <h3 data-i18n="cardStarrailPath">スタレ【運命】</h3>
                    <img src="Image/02_starrail.png" alt="スタレ【運命】" loading="lazy">
                </a>

                <a href="https://uko05.github.io/TiersList03/" class="card">
                    <h3 data-i18n="cardStarrailElem">スタレ【属性】</h3>
                    <img src="Image/03_starrail.png" alt="スタレ【属性】" loading="lazy">
                </a>
            </div>
        </section>

        <!-- フリーフォーマット -->
        <section class="portal-section">
            <h2 id="sec-free" data-i18n="secFree">フリーフォーマット</h2>

            <div class="card-grid">
                <a href="https://uko05.github.io/genshinFormat04/" class="card">
                    <h3 data-i18n="cardGenshin">原神</h3>
                    <img src="Image/04_free.png" alt="原神フリー" loading="lazy">
                </a>

                <a href="https://uko05.github.io/starrailFormat05/" class="card">
                    <h3 data-i18n="cardStarrail">スタレ</h3>
                    <img src="Image/05_free.png" alt="スタレフリー" loading="lazy">
                </a>
            </div>
        </section>

        <!-- チェックシート -->
        <section class="portal-section">
            <h2 id="sec-check" data-i18n="secCheck">チェックシート</h2>

            <div class="card-grid">
                <a href="https://uko05.github.io/genshinCheck06/" class="card">
                    <h3 data-i18n="cardGenshinCheck">#原神チェックシート</h3>
                    <img src="Image/06_check.png" alt="原神チェック" loading="lazy">
                </a>
                
                <a href="https://uko05.github.io/starrailCheck07/" class="card">
                    <h3 data-i18n="cardStarRailCheck">#スタレチェックシート</h3>
                    <img src="Image/07_check.png" alt="スタレチェック" loading="lazy">
                </a>
            </div>
        </section>

        <!-- チェックシート -->
        <section class="portal-section">
            <h2 id="sec-game" data-i18n="secGame">ゲーム</h2>

            <div class="card-grid">
                <a href="https://genshinquiz-eb690.web.app/" class="card">
                    <h3 data-i18n="cardGenshinQuiz">原神クイズ王</h3>
                    <img src="Image/11_quiz.png" alt="原神クイズ王" loading="lazy">
                </a>
                
            </div>
        </section>


    </main>

    <footer class="portal-footer">
        <a href="https://x.com/uko_dayo_" target="_blank" rel="noopener noreferrer" class="twitter-link">
            <img src="Image/twitter_image.png" alt="X(Twitter)" class="twitter-icon">

    </footer>
